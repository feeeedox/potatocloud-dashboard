name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v4

      - id: setup-bun
        name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - id: install-deps
        name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          DATABASE_URL: 'mysql://root:root@localhost:3306/dummy'

      - name: Lint
        run: bun lint

      - name: Build Nuxt
        run: bun nuxt build