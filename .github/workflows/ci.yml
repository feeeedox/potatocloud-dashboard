name: CI

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v6

      - id: setup-ni
        name: Setup
        run: npm i -g @antfu/ni

      - id: install-deps
        name: Install dependencies
        run: nci
        env:
          DATABASE_URL: 'mysql://root:root@localhost:3306/dummy'

      - name: Lint
        run: nr lint --fix
